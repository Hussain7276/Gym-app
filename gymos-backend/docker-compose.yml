version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: gymos_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymos_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: gymos_db
    ports:
      - "5432:5432"
    volumes:
      - gymos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymos_user -d gymos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: gymos_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gymos_user:strongpassword@postgres:5432/gymos_db
      DATABASE_URL_SYNC: postgresql+psycopg2://gymos_user:strongpassword@postgres:5432/gymos_db
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

volumes:
  gymos_pgdata:
